<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Continue to atzorvas/Plum</title>
  <style type="text/css">
    body {
      margin: 0;
      font-size: 16px;
      font-weight: 400;
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      color: #143647;
      text-align: center;
      background: #FFF;
    }

    h2 {
      font-weight: 800;
      margin-top: 0;
    }

    .header {
      padding: 16px;
      position: fixed;
      background: #FFF;
    }

    .container {
      max-width: 800px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .content {
      margin: 0 16px;
    }

    .logo {
      width: 100vw;
    }

    .logo img {
      display: block;
      height: auto;
      border: 0;
      max-width: 107px;
    }

    .message {
      padding: 24px 16px;
      background: #FFF;
      border: 1px solid #F0F6FA;
      box-shadow: 0 2px 16px 0 rgba(20,54,71,0.07);
      border-radius: 12px;
    }

    .btn {
      border-radius: 12px;
      display: block;
      font-size: 16px;
      font-weight: bold;
      line-height: 24px;
      padding: 12px 24px;
      text-align: center;
      text-decoration: none !important;
      transition: opacity 0.1s ease-in;
      color: #ffffff !important;
      background-color: #5f0aff;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <img src="https://s3-eu-west-1.amazonaws.com/plum-production-assets/email/plum-logo-email.png" alt="" width="107">
    </div>
  </div>
  <div class="container">
    <div class="content">
      <div class="message">
        <h2>{{ page.bridge_headline }}</h2>
        <a class="btn" href="#" id='cta'>Open Plum</a>
      </div>
    </div>
  </div>
</body>
<script type="text/javascript">
  // Attempt to redirect on page load.
  try {
    deepLinkRedirect();
  } catch(err) {}

  // Attach a handler to the CTA as a fallback in case the automatic redirect fails.
  document.getElementById('cta').onclick = function(e) {
    e.preventDefault();
    deepLinkRedirect();
  }

  function deepLinkRedirect() {
    var href = window.location.href;
    var deepLinkUrl = href.replace('www.', '').replace(/https?\:\/\//gi, 'withplum://');

    // Redirect the page after a brief timeout to allow for Mixpanel to track the event.
    window.setTimeout(function() { window.location = deepLinkUrl }, 300);
  }
</script>
</html>
